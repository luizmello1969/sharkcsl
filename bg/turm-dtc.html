    <script>
      var delaySeconds = 2166;
      var player = document.querySelector("vturb-smartplayer");

      player.addEventListener("player:ready", function () {
        player.displayHiddenElements(delaySeconds, ["[data-delay]"], {
          persist: true,
        });

        // Scroll to top of video when delayed content is revealed
        const target = document.querySelector("[data-delay]");
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (
              mutation.attributeName === "style" ||
              mutation.attributeName === "class"
            ) {
              const isVisible =
                window.getComputedStyle(target).display !== "none";
              if (isVisible && !window.scrolledOnce) {
                window.scrolledOnce = true;
                setTimeout(() => {
                  document
                    .querySelector("vturb-smartplayer")
                    .scrollIntoView({ behavior: "smooth", block: "start" });
                }, 300);
              }
            }
          });
        });

        if (target) {
          observer.observe(target, { attributes: true });
        }
      });
    </script>

        function updateDisplay() {
          const minutes = Math.floor(totalSeconds / 60);
          const seconds = totalSeconds % 60;
          const display = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

          // Atualiza todos os elementos com id="contador"
          document.querySelectorAll("#contador").forEach((el) => {
            el.textContent = display;
          });
        }

        function countdown() {
          if (totalSeconds > 0) {
            totalSeconds--;
            updateDisplay();
          } else {

          }
        }
